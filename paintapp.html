<!DOCTYPE html>

<head> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="d-flex justify-content-center flex-column mb-3 align-items-center">
    
    <H1>Paint app</H1>
    <div>
    <button id="Red" class="bg-danger w-20 p-2 rounded-5" ></button>
    <button id="Yellow"  class="bg-warning w-20 p-2 rounded-5"></button>
    <button id="blue"  class="bg-primary w-20 p-2 rounded-5"></button>
    <button id="Green"  class="bg-success w-20 p-2 rounded-5"></button>
    <button id="Grey"  class="bg-secondary w-20 p-2 rounded-5"></button>
    <button id="Cyan"  class="bg-info w-20 p-2 rounded-5"></button>
        
    
        </div>
    <br>


    <input placeholder="bruchsize" type = "number" id = "Brushsize_input">
    <br>
    <button id="Eraser"class="bg-light">Eraser</button>
    <br>
    <canvas id="myCanvas" style="border: 2px dashed green;" width="400" height="400"> </canvas>
        
</body>

<script>

    let isdrawing = false

    let red = document.getElementById("Red")
    let Yellow = document.getElementById("Yellow")
    let Blue = document.getElementById("blue")
    let Green = document.getElementById("Green")
    let Grey = document.getElementById("Grey")
    let Cyan = document.getElementById("Cyan")
    let Eraser =document.getElementById("Eraser")

    red.addEventListener("click", TriggerRed)
    Yellow.addEventListener("click", TriggerYellow)
    Blue.addEventListener("click" , TriggerBlue)
    Green.addEventListener("click" , TriggerGreen)
    Grey.addEventListener("click" , TriggerGrey)
    Cyan.addEventListener("click" , TriggerCyan)
    Eraser.addEventListener("click" , TriggerErase)

    let input = document.getElementById("Brushsize_input")

    input.addEventListener("input" , TriggerInput)



    //our javascript
    let canvas = document.getElementById("myCanvas")

    let brush = canvas.getContext("2d")
    canvas.addEventListener("mouseup", TriggerUp)
    canvas.addEventListener("mousedown", TriggerDown)
    canvas.addEventListener("mouseenter", MouseEnter)
    canvas.addEventListener("mouseleave", MouseExit)
    canvas.addEventListener("mousemove", TriggerMove)

    function TriggerDown(info) {
        isdrawing = true
        console.log("mouse pressed")
        console.log(info.offsetX) //see position x
        console.log(info.offsetY) //see position y
        //move the brush to mouse position
        brush.moveTo(info.offsetX, info.offsetY)
        brush.beginPath()

    }

    function TriggerErase(){
        brush.strokeStyle = "White"
    }

    function TriggerInput(){
        brush.lineWidth = input.value
    }

    function TriggerCyan(){
        brush.strokeStyle = "cyan"
    }

    function  TriggerGrey() {
        brush.strokeStyle = "grey"
    }

    function TriggerRed() {
        brush.strokeStyle = "red"
    }

    function TriggerGreen() {
        brush.strokeStyle = "Green"
    }

    function TriggerBlue() {
        brush.strokeStyle = "Blue"
    }

    function TriggerYellow() {
        brush.strokeStyle = "Yellow"
    }

    function TriggerUp() {
        isdrawing = false
    }

    function TriggerMove(info) {
        if (isdrawing == true) {
            brush.lineTo(info.offsetX, info.offsetY)
            brush.stroke()
        }



    }

    function MouseEnter() {
        console.log("Mouse Entered")
    }

    function MouseExit() {
        console.log("Mouse Left")
    }

    function MouseMoveMent() {
        console.log("MouseIsMoving")
    }
</script>
